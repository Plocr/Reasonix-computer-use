[project]
name = "reasonix-computer-use"
version = "0.1.0"
description = "Reasonix computer use 插件——为 Windows 提供 GUI 自动化能力"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "pyautogui>=0.9.54",
    "pynput>=1.7.7",
    "Pillow>=10.0.0",
    "comtypes>=1.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
reasonix-computer-use = "reasonix_computer_use.mcp_server:main"
