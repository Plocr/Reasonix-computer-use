name: tests

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest -q
      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist
