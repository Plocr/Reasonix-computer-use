name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag matches manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content -Raw reasonix-plugin.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match manifest version v$version"
          }

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -q

      - name: Build self-contained Windows package
        shell: pwsh
        run: ./scripts/build_release.ps1 -KeepStage

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build_installer.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-computer-use-windows-x64
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content -Raw reasonix-plugin.json | ConvertFrom-Json).version
          $assets = Get-ChildItem dist -File | Where-Object { $_.Name -match '\.(zip|sha256)$' } |
            Select-Object -ExpandProperty FullName
          if (-not $assets) { throw "No release assets were built" }
          $arguments = @(
            "release", "create", "${{ github.ref_name }}",
            "--title", "Reasonix Computer Use $version",
            "--generate-notes"
          )
          if ($version -match "-") { $arguments += "--prerelease" }
          $arguments += $assets
          & gh @arguments
